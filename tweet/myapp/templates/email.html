<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>email using brevo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            line-height: 1.5;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
        }
        .otp {
            font-size: 22px;
            font-weight: bold;
            color: #007bff;
        }
        .footer {
            font-size: 12px;
            color: #777777;
            text-align: center;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Welcome to StudyShelf!</h2>
        </div>
        <p>Hello {{ name }},</p>
        <p>Thank you for signing up. Your OTP code is:</p>
        <p class="otp">{{ otp_code }}</p>
        <p>Please use this code to complete your verification.</p>
        <p>Best regards,<br>StudyShelf Team</p>
        <div class="footer">
            &copy; 2026 StudyShelf. All rights reserved.
        </div>
    </div>
</body>
</html>
